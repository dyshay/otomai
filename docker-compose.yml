services:
  db:
    image: postgres:16-alpine
    container_name: otomai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: otomai
      POSTGRES_USER: dofus
      POSTGRES_PASSWORD: dofus
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dofus -d otomai"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
