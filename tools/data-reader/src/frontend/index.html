<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Otomai — Data Editor</title>
<style>
:root {
  --bg: #0f1117;
  --bg-panel: #1a1d27;
  --bg-hover: #252836;
  --bg-active: #2d3142;
  --border: #2e3247;
  --text: #e0e0e8;
  --text-muted: #8b8fa3;
  --accent: #d4a847;
  --accent-dim: #a07e2e;
  --danger: #e05252;
  --success: #52c77e;
  --blue: #5b9bd5;
  --radius: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* Layout */
.app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 48px 1fr; height: 100vh; }
.header { grid-column: 1 / -1; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 16px; }
.header h1 { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: .5px; }
.header .path { color: var(--text-muted); font-size: 12px; font-family: var(--mono); }
.header .status { margin-left: auto; font-size: 12px; color: var(--text-muted); }
.header .status .edited { color: var(--accent); font-weight: 600; }

.sidebar { background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; }
.main { display: flex; flex-direction: column; overflow: hidden; }

/* Sidebar */
.sidebar-section { padding: 4px 0; }
.sidebar-section-header { padding: 6px 16px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); cursor: pointer; user-select: none; }
.sidebar-section-header:hover { color: var(--text); }
.sidebar-item { padding: 5px 16px 5px 24px; font-size: 13px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted); }
.sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
.sidebar-item.active { background: var(--bg-active); color: var(--accent); }
.sidebar-item .badge { background: var(--accent-dim); color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-left: 6px; }

/* Toolbar */
.toolbar { display: flex; align-items: center; padding: 8px 16px; gap: 8px; border-bottom: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; }
.toolbar input[type="search"] {
  flex: 1; max-width: 360px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 6px 12px; color: var(--text); font-size: 13px; outline: none;
}
.toolbar input[type="search"]:focus { border-color: var(--accent); }
.toolbar .info { margin-left: auto; font-size: 12px; color: var(--text-muted); }

/* Buttons */
.btn { padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-panel); color: var(--text); font-size: 12px; cursor: pointer; font-family: var(--font); }
.btn:hover { background: var(--bg-hover); }
.btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn.primary:hover { background: var(--accent-dim); }
.btn.danger { border-color: var(--danger); color: var(--danger); }
.btn.danger:hover { background: var(--danger); color: #fff; }
.btn:disabled { opacity: .4; cursor: default; }

/* Content area */
.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* Table */
.table-wrap { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { position: sticky; top: 0; z-index: 1; }
th { background: var(--bg-panel); padding: 8px 12px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
td { padding: 6px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
tr:hover td { background: var(--bg-hover); }
tr.edited td { border-left: 2px solid var(--accent); }
.clickable { cursor: pointer; }
.clickable:hover { color: var(--accent); }

/* Pagination */
.pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border-top: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; font-size: 12px; color: var(--text-muted); }

/* Editor overlay */
.editor-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.editor-panel {
  background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
  width: 720px; max-height: 85vh; display: flex; flex-direction: column;
}
.editor-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.editor-header h2 { font-size: 14px; font-weight: 600; }
.editor-header .close { margin-left: auto; cursor: pointer; color: var(--text-muted); font-size: 18px; }
.editor-header .close:hover { color: var(--text); }
.editor-body { flex: 1; overflow: auto; padding: 0; }
.editor-body textarea {
  width: 100%; min-height: 400px; background: var(--bg); border: none; padding: 16px;
  color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; resize: vertical; outline: none;
}
.editor-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.editor-error { padding: 8px 16px; background: rgba(224,82,82,.15); color: var(--danger); font-size: 12px; }

/* D2I / D2P views */
.text-entry { padding: 8px 16px; border-bottom: 1px solid var(--border); }
.text-entry .text-id { color: var(--accent); font-family: var(--mono); font-size: 12px; margin-right: 8px; }
.text-entry .text-content { font-size: 13px; }

/* Empty state */
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>DOFRUST</h1>
    <span class="path" id="dataPath"></span>
    <div class="status" id="globalStatus"></div>
  </div>

  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="toolbar" id="toolbar"></div>
    <div class="content" id="content">
      <div class="empty">Selectionne un fichier dans la barre laterale</div>
    </div>
  </div>
</div>

<div class="editor-overlay" id="editorOverlay" style="display:none" onclick="if(event.target===this)closeEditor()">
  <div class="editor-panel">
    <div class="editor-header">
      <h2 id="editorTitle">Editer</h2>
      <span class="close" onclick="closeEditor()">&times;</span>
    </div>
    <div id="editorError" class="editor-error" style="display:none"></div>
    <div class="editor-body">
      <textarea id="editorTextarea" spellcheck="false"></textarea>
    </div>
    <div class="editor-footer">
      <button class="btn danger" onclick="resetObject()">Reset</button>
      <button class="btn" onclick="closeEditor()">Annuler</button>
      <button class="btn primary" onclick="saveObject()">Sauvegarder</button>
    </div>
  </div>
</div>

<script>
const S = {
  files: { d2o: [], d2i: [], d2p: [] },
  currentFile: null,
  currentType: null,
  page: 1,
  perPage: 50,
  search: '',
  totalEdits: {},
  editingId: null,
};

// --- API ---
async function api(path, opts) {
  const r = await fetch('/api/' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// --- Init ---
async function init() {
  S.files = await api('files');
  renderSidebar();
}

// --- Sidebar ---
function renderSidebar() {
  const el = document.getElementById('sidebar');
  let html = '';
  for (const [type, files] of Object.entries(S.files)) {
    html += `<div class="sidebar-section">`;
    html += `<div class="sidebar-section-header">${type.toUpperCase()} (${files.length})</div>`;
    for (const f of files) {
      const name = f.replace(/\.[^.]+$/, '');
      const active = S.currentFile === f && S.currentType === type ? ' active' : '';
      const edits = S.totalEdits[f] || 0;
      const badge = edits > 0 ? `<span class="badge">${edits}</span>` : '';
      html += `<div class="sidebar-item${active}" onclick="selectFile('${type}','${f}')">${name}${badge}</div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

// --- File selection ---
async function selectFile(type, file) {
  S.currentType = type;
  S.currentFile = file;
  S.page = 1;
  S.search = '';
  renderSidebar();
  renderToolbar();
  await loadContent();
}

function renderToolbar() {
  const el = document.getElementById('toolbar');
  const edits = S.totalEdits[S.currentFile] || 0;
  let html = `<input type="search" placeholder="Rechercher..." value="${S.search}" oninput="onSearch(this.value)">`;
  if (S.currentType === 'd2o') {
    html += `<button class="btn primary" ${edits === 0 ? 'disabled' : ''} onclick="saveToFile()">Sauvegarder fichier (${edits})</button>`;
  }
  html += `<span class="info" id="toolbarInfo"></span>`;
  el.innerHTML = html;
}

let searchTimeout;
function onSearch(val) {
  S.search = val;
  S.page = 1;
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(loadContent, 300);
}

// --- Content loading ---
async function loadContent() {
  const el = document.getElementById('content');
  if (!S.currentFile) { el.innerHTML = '<div class="empty">Selectionne un fichier</div>'; return; }

  try {
    if (S.currentType === 'd2o') await loadD2O(el);
    else if (S.currentType === 'd2i') await loadD2I(el);
    else if (S.currentType === 'd2p') await loadD2P(el);
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--danger)">Erreur: ${e.message}</div>`;
  }
}

// --- D2O ---
async function loadD2O(el) {
  const params = new URLSearchParams({ page: S.page, per_page: S.perPage });
  if (S.search) params.set('search', S.search);
  params.set('file', S.currentFile);
  const data = await api(`d2o/list?${params}`);

  document.getElementById('toolbarInfo').textContent = `${data.total} objets`;

  let html = '<div class="table-wrap"><table><thead><tr><th>ID</th><th>Classe</th><th>Apercu</th><th></th></tr></thead><tbody>';
  for (const item of data.items) {
    const edited = item._edited ? ' edited' : '';
    const preview = item._preview !== null && item._preview !== undefined ? item._preview : '';
    html += `<tr class="${edited}">
      <td class="clickable" onclick="openObject(${item.id})">${item.id}</td>
      <td>${item._class}</td>
      <td>${escHtml(String(preview))}</td>
      <td><button class="btn" onclick="openObject(${item.id})">Editer</button></td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  html += renderPagination(data);
  el.innerHTML = html;
}

// --- D2I ---
async function loadD2I(el) {
  const params = new URLSearchParams({ page: S.page, per_page: S.perPage });
  if (S.search) params.set('search', S.search);
  params.set('file', S.currentFile);
  const data = await api(`d2i/list?${params}`);

  document.getElementById('toolbarInfo').textContent = `${data.total} textes`;

  let html = '<div class="table-wrap"><table><thead><tr><th style="width:80px">ID</th><th>Texte</th></tr></thead><tbody>';
  for (const item of data.items) {
    html += `<tr><td style="font-family:var(--mono);color:var(--accent)">${item.id}</td><td>${escHtml(item.text)}</td></tr>`;
  }
  html += '</tbody></table></div>';
  html += renderPagination(data);
  el.innerHTML = html;
}

// --- D2P ---
async function loadD2P(el) {
  const params = new URLSearchParams({ page: S.page, per_page: 100 });
  if (S.search) params.set('search', S.search);
  params.set('file', S.currentFile);
  const data = await api(`d2p/list?${params}`);

  document.getElementById('toolbarInfo').textContent = `${data.total} fichiers`;

  let html = '<div class="table-wrap"><table><thead><tr><th>Fichier</th></tr></thead><tbody>';
  for (const item of data.items) {
    html += `<tr><td style="font-family:var(--mono)">${escHtml(item)}</td></tr>`;
  }
  html += '</tbody></table></div>';
  html += renderPagination(data);
  el.innerHTML = html;
}

// --- Pagination ---
function renderPagination(data) {
  if (data.total_pages <= 1) return '';
  return `<div class="pagination">
    <button class="btn" ${data.page <= 1 ? 'disabled' : ''} onclick="goPage(${data.page - 1})">Precedent</button>
    <span>Page ${data.page} / ${data.total_pages}</span>
    <button class="btn" ${data.page >= data.total_pages ? 'disabled' : ''} onclick="goPage(${data.page + 1})">Suivant</button>
  </div>`;
}

function goPage(p) {
  S.page = p;
  loadContent();
}

// --- Object editor ---
async function openObject(id) {
  S.editingId = id;
  const data = await api(`d2o/object?file=${encodeURIComponent(S.currentFile)}&id=${id}`);
  document.getElementById('editorTitle').textContent = `${S.currentFile} — Objet #${id}`;
  document.getElementById('editorTextarea').value = JSON.stringify(data.object, null, 2);
  document.getElementById('editorError').style.display = 'none';
  document.getElementById('editorOverlay').style.display = 'flex';
  document.getElementById('editorTextarea').focus();
}

async function saveObject() {
  const textarea = document.getElementById('editorTextarea');
  const errorEl = document.getElementById('editorError');
  try {
    const obj = JSON.parse(textarea.value);
    await api(`d2o/update?file=${encodeURIComponent(S.currentFile)}&id=${S.editingId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ object: obj }),
    });
    S.totalEdits[S.currentFile] = (S.totalEdits[S.currentFile] || 0) + 1;
    closeEditor();
    renderSidebar();
    renderToolbar();
    await loadContent();
  } catch (e) {
    errorEl.textContent = e.message;
    errorEl.style.display = 'block';
  }
}

async function resetObject() {
  // Reload from original file
  try {
    // Re-fetch ignoring edits — we'd need a reset endpoint, for now just close
    closeEditor();
  } catch (e) {}
}

function closeEditor() {
  document.getElementById('editorOverlay').style.display = 'none';
  S.editingId = null;
}

async function saveToFile() {
  if (!confirm(`Sauvegarder les modifications dans ${S.currentFile} ?\nUn backup .bak sera cree.`)) return;
  try {
    const result = await api(`d2o/save?file=${encodeURIComponent(S.currentFile)}`, { method: 'POST' });
    S.totalEdits[S.currentFile] = 0;
    renderSidebar();
    renderToolbar();
    await loadContent();
    alert(`Sauvegarde OK (${result.bytes_written} octets)\nBackup: ${result.backup}`);
  } catch (e) {
    alert('Erreur: ' + e.message);
  }
}

// --- Keyboard shortcuts ---
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEditor();
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && S.editingId !== null) {
    e.preventDefault();
    saveObject();
  }
});

// --- Utils ---
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
